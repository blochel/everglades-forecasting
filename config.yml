# config.yml
default:
  # Model selection
  models:
    mvgam:
      - baseline
      - ar
      - ar_exog
      - species_specific
      - trait
    fable:
      - baseline
      - arima
      - tslm
      - arima_exog
  
  # Execution control
  run_mvgam: true 
  run_fable: true
  
  # Evaluation settings
  use_ordinal: true
  data_type: numeric  # placeholder for future functionality
  
  # Ordinal category settings
  ordinal_breaks: [0.33, 0.50, 0.67]  # Low, Medium, High, Very High
  sliding_window_breaks: true  # TRUE = recompute per window; FALSE = fixed from full dataset
  ordinal_years: All  # "All" or integer (e.g., 5 for most recent 5 years)
  
  # Cross-validation parameters
  train_years: 20
  test_years: 2
  level: all
  
  # MCMC settings (mvgam)
  chains: 4
  burnin: 1500
  samples: 1500

# Quick testing environment
testing:
  inherits: default
  models:
    mvgam:
      - baseline
      - ar
  chains: 2
  burnin: 500
  samples: 500
  train_years: 15  # Fewer windows for faster testing

# Production runs with all models
production:
  inherits: default
  models:
    mvgam:
      - baseline
      - ar
      - ar_exog
      - species_specific
      - trait
  run_fable: true
  chains: 4
  burnin: 2000
  samples: 2000

# Test without ordinal evaluation
no_ordinal:
  inherits: default
  use_ordinal: false
  models:
    mvgam:
      - baseline
      - ar

# Test fixed vs adaptive ordinal breaks
fixed_breaks:
  inherits: default
  sliding_window_breaks: false
  ordinal_years: All

recent_breaks:
  inherits: default
  sliding_window_breaks: false
  ordinal_years: 5
  
  
 # Plotting options
  plots:
    skill_over_time: true
    best_model_counts: true
    forecast_timeseries: true  # New option
    ts_models: ["baseline", "ar"]  # Which models to plot
    ts_species: ["gbhe", "greg", "rosp"]  # Which species to plot