# =============================================================================
# WADING BIRD FORECAST CONFIGURATION
# =============================================================================

# -----------------------------------------------------------------------------
# DEFAULT CONFIGURATION (Base settings inherited by all profiles)
# -----------------------------------------------------------------------------
default:
  # Spatial configuration
  spatial:
    level: subregion                    # "all", "subregion", "colony"
    forecast_totals: false              # species or total
    include_species: "top6"             # "top6", "all", or a list like ["wost", "whib", "anhi"]
    include_unknowns: true              # keeps unkn, smwh, lawh, etc.
    fill_missing: true
    fill_value: 0
    min_years_required: 10
    exclude_regions: []
    include_regions: []
    exclude_colonies: []
    include_colonies: []
    run_by_region: false          # Use hierarchical models (faster!)

  # Model selection
  models:
    mvgam:
      - baseline
      - ar
      - ar_exog
      - ar_exog_plus
      - species_specific
      - trait
      - trait2
    fable:
      - baseline
      - arima
      - tslm
      - arima_exog
      - gam
  
  # Execution control
  run_mvgam: false
  run_fable: true

  # Evaluation settings
  use_ordinal: true
  data_type: numeric

  # Ordinal category settings
  ordinal_breaks: [0.33, 0.50, 0.67]
  sliding_window_breaks: true
  ordinal_years: All

  # Cross-validation parameters
  train_years: 20
  test_years: 2
  cv_windows: null              # null = all windows, or set number to limit

  # Parallel processing 
  parallel:
    enabled: true
    workers: null                # null = auto-detect cores

  # Caching
  cache:
    data: true
    models: false                # Set to true to cache fitted models
    force_refit: false           # Force refit even if cache exists

  # MCMC settings (mvgam)
  chains: 4
  burnin: 2000
  samples: 2000
  adapt_delta: 0.95              # Stan tuning (higher = more accurate but slower)
  max_treedepth: 10              # Stan tuning

  # Plotting options
  plots:
    forecast_timeseries: true
    ts_models: ["baseline", "ar", "trait"]
    ts_species: ["gbhe", "greg", "rosp", "wost", "whib", "sneg"]

# -----------------------------------------------------------------------------
# TESTING CONFIGURATIONS (Fast iterations for development)
# -----------------------------------------------------------------------------

# Quick testing - minimal models, fast MCMC
testing:
  inherits: default
  
  # Minimal models
  models:
    mvgam:
      - baseline
      - trait                    
    fable: []                    
  
  run_mvgam: true
  run_fable: false
  
  # Fast MCMC
  chains: 2
  burnin: 500
  samples: 500
  adapt_delta: 0.90
  
  # Limited CV windows
  train_years: 15
  test_years: 2
  cv_windows: 3                  # Only last 3 windows
  
  # Parallel (but fewer workers for testing)
  parallel:
    enabled: true
    workers: 2
  
  # Caching
  cache:
    data: true
    models: false
  
  # Minimal plotting
  plots:
    skill_over_time: true
    best_model_counts: false
    forecast_timeseries: false

# Very quick test - single model, minimal settings
quick_test:
  inherits: testing
  
  models:
    mvgam:
      - baseline                 # Just baseline for speed
    fable: []
  
  chains: 1
  burnin: 250
  samples: 250
  cv_windows: 2                  # Just 2 windows
  
  parallel:
    enabled: false               # Sequential for debugging
  
  use_ordinal: false             # Skip ordinal for speed

# Test trait model specifically
test_trait:
  inherits: testing
  
  models:
    mvgam:
      - baseline
      - ar
      - ar_exog
      - ar_exog_plus
      - species_specific
      - trait
      - trait2
    fable: []
  
  chains: 2
  burnin: 500
  samples: 500
  cv_windows: 3
  
  parallel:
    enabled: true
    workers: 2

# -----------------------------------------------------------------------------
# SPATIAL CONFIGURATIONS
# -----------------------------------------------------------------------------

# Subregion level - hierarchical (RECOMMENDED)
test_subregion_hierarchical:
  inherits: default
  
  spatial:
    level: subregion
    min_years_required: 15
    run_by_region: false         # Hierarchical model (faster!)
  
  models:
    mvgam:
      - baseline
      - trait                    # Best model for subregions
    fable: []
  
  chains: 2
  burnin: 500
  samples: 500
  cv_windows: 3
  
  parallel:
    enabled: true
    workers: 4

# Subregion level - separate models (SLOW, but for comparison)
test_subregion_separate:
  inherits: default
  
  spatial:
    level: subregion
    min_years_required: 15
    run_by_region: true          # Separate models per region
  
  models:
    mvgam:
      - baseline
      - ar
    fable: []
  
  chains: 2
  burnin: 500
  samples: 500
  cv_windows: 3
  
  parallel:
    enabled: true
    workers: 4                   # Parallel across CV windows

# Colony level - hierarchical
test_colony_hierarchical:
  inherits: default
  
  spatial:
    level: colony
    min_years_required: 15
    run_by_region: false         # Hierarchical (borrow strength)
  
  models:
    mvgam:
      - baseline
      - trait
    fable: 
      - baseline
      - arima
      - tslm
      - arima_exog
      - gam
  
  chains: 2
  burnin: 1000
  samples: 1000
  cv_windows: 3
  adapt_delta: 0.99
  
  parallel:
    enabled: true
    workers: 4

# Colony level - specific colonies only
test_colony_subset:
  inherits: test_colony_hierarchical
  
  spatial:
    level: colony
    min_years_required: 20
    include_colonies:
      - hidden
      - alley_north
      - 6th_bridge
      - horus
      - lox99

# -----------------------------------------------------------------------------
# PRODUCTION CONFIGURATIONS (Full runs with all features)
# -----------------------------------------------------------------------------

# Production - system-wide
production:
  inherits: default

  spatial:
    level: all
    run_by_region: false

  models:
    mvgam:
      - baseline
      - ar
      - ar_exog
      - ar_exog_plus
      - species_specific
      - trait
      - trait2
    fable:
      - baseline
      - arima
      - tslm
      - arima_exog
      - gam

  run_mvgam: true
  run_fable: true

  # Full MCMC
  chains: 4
  burnin: 2000
  samples: 2000
  adapt_delta: 0.99
  max_treedepth: 12

  # All CV windows
  cv_windows: null

  # Full parallel
  parallel:
    enabled: true
    workers: null

  # Caching
  cache:
    data: true
    models: true

  # Full evaluation
  use_ordinal: true

  # All plots
  plots:
    skill_over_time: true
    best_model_counts: true
    forecast_timeseries: true
    ts_models: ["baseline", "ar", "trait"]
    ts_species: ["gbhe", "greg", "rosp", "wost", "whib", "sneg"]

# Production - subregional hierarchical (RECOMMENDED for management)
production_subregion:
  inherits: default

  spatial:
    level: subregion
    min_years_required: 15
    run_by_region: false

  models:
    mvgam:
      - baseline
      - ar
      - ar_exog
      - ar_exog_plus
      - species_specific
      - trait
      - trait2
    fable:
      - baseline
      - arima
      - tslm
      - arima_exog
      - gam

  run_mvgam: true
  run_fable: true

  chains: 4
  burnin: 2000
  samples: 2000

  cv_windows: null

  parallel:
    enabled: true
    workers: null

  cache:
    data: true
    models: true

  use_ordinal: true

  plots:
    skill_over_time: true
    best_model_counts: true
    forecast_timeseries: true
    ts_models: ["baseline", "ar", "trait"]
    ts_species: ["gbhe", "greg", "rosp", "wost", "whib", "sneg"]

# -----------------------------------------------------------------------------
# MODEL COMPARISON CONFIGURATIONS
# -----------------------------------------------------------------------------

# Compare all mvgam models (no fable)
compare_mvgam:
  inherits: default
  
  models:
    mvgam:
      - baseline
      - ar
      - ar_exog
      - species_specific
      - trait
    fable: []
  
  run_mvgam: true
  run_fable: false
  
  chains: 2
  burnin: 500
  samples: 500
  cv_windows: 5
  
  parallel:
    enabled: true
    workers: 4

# Compare fable models only
compare_fable:
  inherits: default
  
  models:
    mvgam:
      - baseline                 # mvgam baseline for comparison
    fable:
      - baseline
      - arima
      - tslm
      - arima_exog
      - gam
  
  run_mvgam: true                # Need mvgam baseline
  run_fable: true
  
  chains: 2
  burnin: 500
  samples: 500
  train_years: 15
  cv_windows: 5
  
  parallel:
    enabled: true
    workers: 4

# Trait model vs simple models
compare_complexity:
  inherits: default
  
  models:
    mvgam:
      - baseline                 # Simplest
      - ar                       # Simple AR
      - ar_exog                  # AR + covariates
      - trait                    # Trait-based (complex)
    fable: []
  
  run_mvgam: true
  run_fable: false
  
  chains: 3
  burnin: 750
  samples: 750
  cv_windows: 5
  
  parallel:
    enabled: true
    workers: 4
  
  use_ordinal: true

# -----------------------------------------------------------------------------
# ORDINAL EVALUATION CONFIGURATIONS
# -----------------------------------------------------------------------------

# Test without ordinal (faster)
no_ordinal:
  inherits: default
  
  use_ordinal: false
  
  models:
    mvgam:
      - baseline
      - trait
    fable: []
  
  chains: 2
  burnin: 500
  samples: 500
  cv_windows: 3

# Test fixed vs adaptive ordinal breaks
fixed_breaks:
  inherits: default
  
  sliding_window_breaks: false   # Fixed breaks from all data
  ordinal_years: All
  
  models:
    mvgam:
      - baseline
      - trait
    fable: []
  
  chains: 2
  burnin: 500
  samples: 500
  cv_windows: 3

# Recent breaks only
recent_breaks:
  inherits: default
  
  sliding_window_breaks: false
  ordinal_years: 5               # Last 5 years only
  
  models:
    mvgam:
      - baseline
      - trait
    fable: []
  
  chains: 2
  burnin: 500
  samples: 500
  cv_windows: 3

# -----------------------------------------------------------------------------
# DEBUGGING CONFIGURATIONS
# -----------------------------------------------------------------------------

# Debug single window (no CV)
debug_single_window:
  inherits: quick_test
  
  train_years: 20
  test_years: 2
  cv_windows: 1                  # Just one window
  
  chains: 1
  burnin: 100
  samples: 100
  
  parallel:
    enabled: false               # Sequential for debugging
  
  cache:
    data: true
    models: false

# Debug parallel processing
debug_parallel:
  inherits: testing
  
  cv_windows: 4
  
  parallel:
    enabled: true
    workers: 2                   # Small number for debugging
  
  chains: 1
  burnin: 250
  samples: 250

