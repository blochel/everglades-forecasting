default:
  spatial:
    level: all          # "all", "subregion", "colony"
    fill_missing: true
    fill_value: 0
    min_years_required: 10
    exclude_regions: []
    include_regions: []
    exclude_colonies: []  # ← NEW
    include_colonies: []  # ← NEW
    run_by_region: false

# Colony level - all viable colonies
test_colony:
  inherits: default
  spatial:
    level: colony
    min_years_required: 15
    run_by_region: true   # Each colony separately
  models:
    mvgam:
      - baseline
      - ar
  chains: 2
  burnin: 500
  samples: 500

# Colony level - specific colonies only
test_colony_subset:
  inherits: default
  spatial:
    level: colony
    min_years_required: 20
    include_colonies:
      - hidden
      - alley_north
      - 6th_bridge
      - horus
      - lox99
  models:
    mvgam:
      - baseline
      - ar
  chains: 2
  burnin: 500
  samples: 500